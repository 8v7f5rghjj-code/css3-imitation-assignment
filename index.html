<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safiie Devletshaieva - CSS3 Imitation Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>CSS3 Image Manipulation Project</h1>
        <p class="student-name">Student: Safiie Devletshaieva</p>
    </header>

    <main class="projects-grid">
        <div class="project-card">
            <h3>Project 1: Penguins Oval</h3>
            <div class="img-container-1">
                <img src="penguins.jpg" alt="Penguins Oval" class="penguins-img">
            </div>
        </div>

        <div class="project-card">
            <h3>Project 2: Football Field</h3>
            <div class="football-field-project">
                <img src="tic-tac-toe.png" alt="Grid Overlay" class="grid-overlay">
            </div>
        </div>

        <div class="project-card">
            <h3>Project 3: Dinosaur Shadow</h3>
            <div class="img-container-3">
                <img src="dinosaur.png" alt="Dinosaur" class="dinosaur-img">
            </div>
        </div>

        <div class="project-card">
            <h3>Project 4: Mirrored Seagull</h3>
            <div class="img-container-4">
                <img src="seagull.png" alt="Seagull" class="seagull-img">
            </div>
        </div>

        <div class="project-card">
            <h3>Project 5: Inverted Butterfly</h3>
            <div class="img-container-5">
                <img src="butterfly.jpg" alt="Butterfly" class="butterfly-img">
            </div>
        </div>

        <div class="project-card">
            <h3>Project 6: Theater Presenting</h3>
            <div class="theater-project">
                <div class="theater-text">Presenting</div>
            </div>
        </div>
    </main>

</body>
</html>
